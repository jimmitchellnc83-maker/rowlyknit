<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Run your knitting projects without losing your place. Row-by-row tracking, yarn stash, pattern library, and free calculators (gauge, gift size, yarn substitution) — all in one workspace." />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1f2937" />
    <meta name="build-timestamp" content="VITE_BUILD_TIMESTAMP" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rowlyknit.com/" />
    <meta property="og:title" content="Rowly — Run your knitting projects without losing your place" />
    <meta property="og:description" content="Row-by-row tracking, yarn stash, pattern library, and free calculators (gauge, gift size, yarn sub) — plan with what you already own." />
    <meta property="og:image" content="https://rowlyknit.com/icon-512x512.png" />
    <meta property="og:site_name" content="Rowly" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://rowlyknit.com/" />
    <meta name="twitter:title" content="Rowly — Run your knitting projects without losing your place" />
    <meta name="twitter:description" content="Row-by-row tracking, yarn stash, pattern library, and free calculators (gauge, gift size, yarn sub) — plan with what you already own." />
    <meta name="twitter:image" content="https://rowlyknit.com/icon-512x512.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://rowlyknit.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Google AdSense site script is injected lazily by
         `frontend/src/components/ads/useAdSenseScript.ts` only on
         approved public content/tool routes (see adRoutes.ts). Loading
         it site-wide via this index would put a third-party request on
         every landing / auth / admin / authenticated app page even
         though the ad SLOTS render nowhere there. Publisher
         verification still works because AdSense's crawler hits the
         same public pages we render slots on. The `/ads.txt` file
         served by the same nginx confirms the publisher relationship
         independently of the script load location. -->

    <title>Rowly - Knitting Project Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
