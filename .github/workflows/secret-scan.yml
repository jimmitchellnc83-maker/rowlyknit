name: Secret Scan

# Runs gitleaks on every PR and push to main. Pull-request runs scan only the
# PR's commits (so historical leaks on main don't re-fail the build); push runs
# scan the push range. `workflow_dispatch` lets us manually kick off an audit.
#
# A follow-up `git filter-repo` is planned to purge the pre-rotation secret
# commits (tracked in docs/MVP_LAUNCH_PUNCHLIST.md Phase 1). Until then,
# historical leaks would only surface on a full-history audit — add entries to
# `.gitleaksignore` by fingerprint if that noise becomes a problem.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same ref to save minutes.
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks needs full history to diff commits correctly.
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE needed for personal accounts (only orgs require it).
