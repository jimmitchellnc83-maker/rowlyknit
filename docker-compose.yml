services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rowly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rowly_production}
      POSTGRES_USER: ${DB_USER:-rowly_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Note: migrations are run by the backend via Knex, not by PostgreSQL init
      # - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"  # Bind to localhost only - not publicly accessible
    networks:
      - rowly_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rowly_user -d rowly_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for rate limiting and caching
  redis:
    image: redis:7-alpine
    container_name: rowly_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # Bind to localhost only - not publicly accessible
    networks:
      - rowly_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rowly_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backups:/backups
      - /var/log/rowly:/var/log/rowly
    ports:
      - "127.0.0.1:5000:5000"  # Bind to localhost - nginx proxies public access
      - "127.0.0.1:9090:9090"  # Prometheus metrics - localhost only
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rowly_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty default so the frontend bundle's axios falls back to
        # `window.location.origin` (same-origin) for API calls. The previous
        # default of `https://api.rowlyknit.com` baked a non-existent
        # subdomain into the build, which got CSP-blocked + broke login the
        # moment the docker layer cache invalidated and the value was
        # actually re-baked into the bundle.
        VITE_API_URL: ${VITE_API_URL-}
    container_name: rowly_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - rowly_network
    depends_on:
      - backend

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: rowly_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deployment/ssl:/etc/nginx/ssl:ro
      - ./backend/uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - rowly_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  rowly_network:
    driver: bridge
